<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
    </style>

</head>

<body>
    <div class="container">
        <table class="table table-striped mt-4">
            <tr>
                <td colspan="3" style="vertical-align: middle; border: none; background-color: #2596be;">
                    <h1 class="table_head">Manage Employees</h1>
                </td>
                <td colspan="3"
                    style="vertical-align: middle; text-align: right; border: none; background-color: #2596be;">
                    <a href="{% url 'emp_create'%}" class="btn btn-success">ADD NEW EMPLOYEE</a>
                </td>
            </tr>
            <tr>
                <th scope="col">Emp ID</th>
                <th scope="col">Emp Name</th>
                <th scope="col">Emp Email</th>
                <th scope="col">Emp Address</th>
                <th scope="col" colspan="2">Action</th>
            </tr>
            <tbody>
                {% for emp in employees%}
                <tr>
                    <th>{{emp.emp_id}}</th>
                    <td>{{emp.emp_name}}</td>
                    <td>{{emp.emp_email}}</td>
                    <td>{{emp.emp_address}}</td>
                    <td>
                        <a href="{% url 'emp_edit' emp.id%}" class="btn btn-primary">
                            <i class="bi bi-pencil"></i>
                        </a>
                    </td>
                    <td>
                        <a href="{% url 'emp_delete' emp.id %}" class="btn btn-danger">
                            <i class="bi bi-trash3"></i>
                        </a>
                    </td>
                </tr>
                {% endfor%}
            </tbody>
        </table>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
